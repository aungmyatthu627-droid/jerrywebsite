<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerry's webpage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #020205; 
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }

        
        .supernova-flash {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #ffffff 10%, #6ee7b7 40%, #3b82f6 70%, transparent 100%);
            border-radius: 50%;
            opacity: 0;
            z-index: 999;
            pointer-events: none; 
            transition: transform 1.2s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 0.8s ease;
        }

        
        .supernova-flash.active {
            transform: translate(-50%, -50%) scale(300); 
            opacity: 1;
        }

      
        #svg-source {
            display: none;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="supernova-flash" id="flash"></div>

    <svg id="svg-source" viewBox="0 0 100 100">
        <path d="M50,30 C50,30 38,14 22,14 C8,14 0,26 0,40 C0,60 26,76 50,92 C74,76 100,60 100,40 C100,26 92,14 78,14 C62,14 50,30 50,30 Z"/>
    </svg>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 70;

        const flash = document.getElementById('flash');
        
     
        const targetWebpage = "home.html"; 
        const textureLoader = new THREE.TextureLoader();
        const imageUrls = [
            "photo_6152124147526471949_y.jpg",
            "photo2.jpg",
            "photo3.jpg",
            "photo_6336754303271374922_y.jpg",
            "photo1.jpg"
        ];
        
        const textures = imageUrls.map(url => textureLoader.load(url));

        const path = document.querySelector("path");
        const length = path.getTotalLength();
        const geometry = new THREE.BufferGeometry();
        const positions = [];
        const particles = [];

        // GSAP Timeline (ပုံမှန်အချိန်မှာ ပတ်မောင်းနေမယ်)
        const tl = gsap.timeline({ repeat: -1, yoyo: true, repeatDelay: 1.5 });
        
        let isWarping = false; // နှိပ်လိုက်ပြီး Warp Effect ဖြစ်နေတဲ့ အခြေအနေလား သိဖို့

        // ၁။ For Loop ဖြင့် 3D Vector ပြောင်းလဲပြီး Random ဖြန့်ခြင်း
        for (let i = 0; i < length; i += 0.2) {
            const point = path.getPointAtLength(i);
            
            const targetX = (point.x - 50) * 0.8; 
            const targetY = -(point.y - 50) * 0.8;
            const targetZ = 0;

            const startX = targetX + (Math.random() - 0.5) * 60;
            const startY = targetY + (Math.random() - 0.5) * 60;
            const startZ = targetZ + (Math.random() - 0.5) * 80;

            const pObj = { x: startX, y: startY, z: startZ, targetX, targetY, targetZ };
            positions.push(startX, startY, startZ);
            particles.push(pObj);

            tl.to(pObj, {
                x: targetX,
                y: targetY,
                z: targetZ,
                ease: "power2.inOut",
                duration: gsap.utils.random(2, 4),
                onUpdate: function() {
                    if (!isWarping) updateParticlePosition(i, pObj);
                }
            }, i * 0.005);
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

        // =======================================================
        // 🌟 [အစက်တွေနေရာမှာ ပုံဝင်အောင် Material ပြောင်းလိုက်တာပါ] 🌟
        // =======================================================
        const material = new THREE.PointsMaterial({
            map: textures[0], // ပထမဆုံးပုံ (photo1.jpg) ကို အခြေခံ Texture အဖြစ်သုံးခြင်း
            size: 2.5,        // ပုံတွေသေချာမြင်ရအောင် size ကို ၂.၅ အထိ တင်ပေးထားပါတယ်
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false // ပုံတွေတစ်ခုနဲ့တစ်ခုထပ်ရင် အမည်းကွက်မပေါ်အောင် ကာကွယ်ခြင်း
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        function updateParticlePosition(i, pObj) {
            const idx = Math.floor(i / 0.2) * 3;
            const posArray = geometry.attributes.position.array;
            if(posArray[idx] !== undefined) {
                posArray[idx] = pObj.x;
                posArray[idx + 1] = pObj.y;
                posArray[idx + 2] = pObj.z;
                geometry.attributes.position.needsUpdate = true;
            }
        }

        // ၂။ Render Loop (အမြဲတမ်း ပတ်မောင်းနေမယ့်စနစ်)
        function animate() {
            requestAnimationFrame(animate);
            if (!isWarping) {
                particleSystem.rotation.y += 0.002;
            }
            renderer.render(scene, camera);
        }
        animate();

        // ၃။ Warp Speed Effect + Supernova Flash + Webpage Link Trigger
        const canvas = document.getElementById('webgl-canvas');
        canvas.addEventListener('click', triggerWarpEffect);

        function triggerWarpEffect() {
            if (isWarping) return; // တစ်ခါနှိပ်ပြီးရင် ထပ်နှိပ်မရအောင် ထိန်းတာပါ
            isWarping = true;
            
            // ၁။ GSAP Animations အားလုံးကို ရပ်ပစ်ခြင်း
            tl.kill();

            // ၂။ ပုံမှုန်အားလုံးကို အလယ်ဗဟို ($0,0,0$) ထဲ အရှိန်အဟုန်ပြင်းပြင်း စုပ်ယူသွားခြင်း
            const posArray = geometry.attributes.position.array;
            
            particles.forEach((pObj, i) => {
                const idx = i * 3;
                
                // Hyperspace Warp Speed အတွက် အလယ်ဗဟို $z$-axis အနောက်ဘက်ထဲ စုပ်ယူခြင်း
                gsap.to(pObj, {
                    x: 0,
                    y: 0,
                    z: -200, // <--- စုပ်ယူမယ့် အနက်
                    duration: gsap.utils.random(0.8, 1.2), // မြန်မြန်ဆန်ဆန် ပြီးမြောက်စေခြင်း
                    ease: "power4.in",
                    onUpdate: function() {
                        posArray[idx] = pObj.x;
                        posArray[idx + 1] = pObj.y;
                        posArray[idx + 2] = pObj.z;
                        geometry.attributes.position.needsUpdate = true;
                    }
                });
            });

            // ၃။ ၁ စက္ကန့်အတွင်း ပေါက်ကွဲထွက်မယ့် Flash အလင်းတန်းကြီး ပေါ်လာမယ်
            setTimeout(() => {
                flash.classList.add('active');
                
                // အလင်းထွက်ပြီး ခဏနေရင် Webpage အသစ်သို့ ရွှေ့သွားမယ်
                setTimeout(() => {
                    window.location.href = targetWebpage;
                }, 1000);

            }, 800);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
