<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Jerry's webpage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* iOS Safari မှာ အောက်ဆွဲချရင် bounce ဖြစ်ပြီး scroll ပတ်တာကို ကာကွယ်ရန် */
            -webkit-overflow-scrolling: touch;
        }

        body, html {
            background-color: #020205; 
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: fixed; /* iOS browser bar တွေ ရွေ့ပြီး layout မပျက်စေရန် */
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        /* Supernova Flash scale ကို mobile ဖုန်းတွေမှာလည်း အုပ်မိအောင် scale တင်ထားသည် */
        .supernova-flash {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #ffffff 10%, #6ee7b7 40%, #3b82f6 70%, transparent 100%);
            border-radius: 50%;
            opacity: 0;
            z-index: 999;
            pointer-events: none; 
            transition: transform 1.5s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 0.8s ease;
        }

        .supernova-flash.active {
            transform: translate(-50%, -50%) scale(500); /* ပိုကြီးမားသော scale သို့ ပြောင်းလဲထားသည် */
            opacity: 1;
        }

        #svg-source {
            display: none;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    <div class="supernova-flash" id="flash"></div>

    <svg id="svg-source" viewBox="0 0 100 100">
        <path d="M50,30 C50,30 38,14 22,14 C8,14 0,26 0,40 C0,60 26,76 50,92 C74,76 100,60 100,40 C100,26 92,14 78,14 C62,14 50,30 50,30 Z"/>
    </svg>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // ဖုန်း display တွေမှာ ဝါးမသွားဘဲ ကြည်လင်ပြတ်သားနေစေရန် pixel ratio သတ်မှတ်ခြင်း
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // ဖုန်း screen အကျယ်အဝန်းအလိုက် ကင်မရာတည်နေရာ (Z-axis) ကို တွက်ချက်ခြင်း
        function adjustCamera() {
            if (window.innerWidth < 480) {
                camera.position.z = 100; // Screen သေးသော ဖုန်းများအတွက် particle စုစုလေး ဖြစ်နေစေရန် အဝေးသို့ ရွှေ့ခြင်း
            } else if (window.innerWidth < 768) {
                camera.position.z = 85;
            } else {
                camera.position.z = 70; // Desktop အတွက် မူလအတိုင်း
            }
        }
        adjustCamera();

        const flash = document.getElementById('flash');
        const targetWebpage = "home.html"; 
        const textureLoader = new THREE.TextureLoader();
        const imageUrls = [
            "photo_6152124147526471949_y.jpg",
            "photo2.jpg",
            "photo3.jpg",
            "photo_6336754303271374922_y.jpg",
            "photo1.jpg"
        ];
        
        const textures = imageUrls.map(url => textureLoader.load(url));

        const path = document.querySelector("path");
        const length = path.getTotalLength();
        const geometry = new THREE.BufferGeometry();
        const positions = [];
        const particles = [];

        const tl = gsap.timeline({ repeat: -1, yoyo: true, repeatDelay: 1.5 });
        let isWarping = false; 

        for (let i = 0; i < length; i += 0.2) {
            const point = path.getPointAtLength(i);
            
            const targetX = (point.x - 50) * 0.8; 
            const targetY = -(point.y - 50) * 0.8;
            const targetZ = 0;

            const startX = targetX + (Math.random() - 0.5) * 60;
            const startY = targetY + (Math.random() - 0.5) * 60;
            const startZ = targetZ + (Math.random() - 0.5) * 80;

            const pObj = { x: startX, y: startY, z: startZ, targetX, targetY, targetZ };
            positions.push(startX, startY, startZ);
            particles.push(pObj);

            tl.to(pObj, {
                x: targetX,
                y: targetY,
                z: targetZ,
                ease: "power2.inOut",
                duration: gsap.utils.random(2, 4),
                onUpdate: function() {
                    if (!isWarping) updateParticlePosition(i, pObj);
                }
            }, i * 0.005);
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

        // ဖုန်းပေါ်တွင် သင့်တော်သောအစက်အရွယ်အစားရစေရန် size ထိန်းညှိခြင်း
        const particleSize = window.innerWidth < 480 ? 1.8 : 2.5;

        const material = new THREE.PointsMaterial({
            map: textures[0], 
            size: particleSize,        
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false 
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        function updateParticlePosition(i, pObj) {
            const idx = Math.floor(i / 0.2) * 3;
            const posArray = geometry.attributes.position.array;
            if(posArray[idx] !== undefined) {
                posArray[idx] = pObj.x;
                posArray[idx + 1] = pObj.y;
                posArray[idx + 2] = pObj.z;
                geometry.attributes.position.needsUpdate = true;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isWarping) {
                particleSystem.rotation.y += 0.002;
            }
            renderer.render(scene, camera);
        }
        animate();

        // Android နှင့် iOS Touch triggers များအတွက် Event Listener များ ချိတ်ဆက်ခြင်း
        const canvas = document.getElementById('webgl-canvas');
        canvas.addEventListener('click', triggerWarpEffect);
        canvas.addEventListener('touchstart', (e) => {
            // zoom သို့မဟုတ် browser default double-tap prevent လုပ်ရန်
            if (e.touches.length === 1) {
                triggerWarpEffect();
            }
        }, { passive: true });

        function triggerWarpEffect() {
            if (isWarping) return; 
            isWarping = true;
            
            tl.kill();

            const posArray = geometry.attributes.position.array;
            
            particles.forEach((pObj, i) => {
                const idx = i * 3;
                
                gsap.to(pObj, {
                    x: 0,
                    y: 0,
                    z: -200, 
                    duration: gsap.utils.random(0.8, 1.2), 
                    ease: "power4.in",
                    onUpdate: function() {
                        posArray[idx] = pObj.x;
                        posArray[idx + 1] = pObj.y;
                        posArray[idx + 2] = pObj.z;
                        geometry.attributes.position.needsUpdate = true;
                    }
                });
            });

            setTimeout(() => {
                flash.classList.add('active');
                
                setTimeout(() => {
                    window.location.href = targetWebpage;
                }, 1000);

            }, 800);
        }

        // Screen Size အပြောင်းအလဲဖြစ်တိုင်း Auto Scale ပြန်လုပ်ရန်
        window.addEventListener('resize', () => {
            adjustCamera();
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });
    </script>
</body>
</html>
